<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project_huda | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #fafafa;
            overflow-x: hidden;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .gradient-text {
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glow {
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.05);
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes pulse-soft {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 0.8;
            }
        }

        .animate-pulse-slow {
            animation: pulse-soft 4s infinite ease-in-out;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <!-- Background Decoration -->
    <div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none">
        <div
            class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-white/5 rounded-full blur-[120px] animate-pulse-slow">
        </div>
        <div
            class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-white/5 rounded-full blur-[120px] animate-pulse-slow">
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-2xl w-full text-center space-y-12">

        <!-- Logo/Header -->
        <div class="space-y-2">
            <h1 class="text-4xl md:text-6xl font-semibold tracking-tighter">
                <span class="mono gradient-text text-2xl md:text-3xl block mb-2">project_huda</span>
            </h1>
            <p class="text-zinc-400 text-lg md:text-xl font-light tracking-wide italic">
                “We are cooking something spiritual.”
            </p>
        </div>

        <!-- Progress Card -->
        <div class="glass rounded-3xl p-8 md:p-12 space-y-8 glow">
            <div class="space-y-4">
                <div class="flex justify-between text-sm mono text-zinc-500 uppercase tracking-widest">
                    <span>Build Status: Active</span>
                    <span id="progressText">0% Complete</span>
                </div>
                <div class="w-full h-1 bg-zinc-800 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-white rounded-full transition-all duration-1000"
                        style="width: 0%"></div>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-4">
                <div class="flex flex-col">
                    <span id="days" class="text-2xl md:text-3xl font-semibold">14</span>
                    <span class="text-[10px] uppercase text-zinc-500 mono">Days</span>
                </div>
                <div class="flex flex-col">
                    <span id="hours" class="text-2xl md:text-3xl font-semibold">08</span>
                    <span class="text-[10px] uppercase text-zinc-500 mono">Hours</span>
                </div>
                <div class="flex flex-col">
                    <span id="minutes" class="text-2xl md:text-3xl font-semibold">42</span>
                    <span class="text-[10px] uppercase text-zinc-500 mono">Mins</span>
                </div>
                <div class="flex flex-col">
                    <span id="seconds" class="text-2xl md:text-3xl font-semibold">19</span>
                    <span class="text-[10px] uppercase text-zinc-500 mono">Secs</span>
                </div>
            </div>
        </div>

        <!-- Subscription Form -->
        <div class="space-y-6">
            <p class="text-sm text-zinc-500 mono">GET NOTIFIED ON DEPLOYMENT</p>
            <form id="waitlistForm" class="flex flex-col sm:flex-row gap-3">
                <input type="email" placeholder="Enter your email address" required
                    class="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl px-5 py-3 focus:outline-none focus:border-white transition-colors text-white">
                <button type="submit"
                    class="bg-white text-black font-semibold px-8 py-3 rounded-xl hover:bg-zinc-200 transition-colors">
                    Join Waitlist
                </button>
            </form>
            <p id="successMsg" class="hidden text-green-400 text-sm mono">Success! You're on the list.</p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="mt-20 text-zinc-600 text-[11px] mono uppercase tracking-widest text-center">
        &copy; 2026 project_huda | Qim Lab // Focus. Clarity. Guidance.
    </footer>

    <script>
        // Set your start and target dates here
        const startDate = new Date("2026-03-01T00:00:00").getTime();
        const targetDate = new Date("2027-01-01T00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // Calculate percentage
            const totalDuration = targetDate - startDate;
            const elapsed = now - startDate;
            let percentage = (elapsed / totalDuration) * 100;

            // Constrain percentage between 0 and 100
            percentage = Math.max(0, Math.min(100, Math.floor(percentage)));

            // Update Progress Bar
            document.getElementById('progressText').innerText = `${percentage}% Complete`;
            document.getElementById('progressBar').style.width = `${percentage}%`;

            if (distance < 0) {
                document.getElementById('days').innerText = '00';
                document.getElementById('hours').innerText = '00';
                document.getElementById('minutes').innerText = '00';
                document.getElementById('seconds').innerText = '00';
                document.getElementById('progressText').innerText = "100% Complete";
                document.getElementById('progressBar').style.width = "100%";
                return;
            }

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        // Form Handling
        document.getElementById('waitlistForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const input = e.target.querySelector('input');
            const success = document.getElementById('successMsg');

            btn.innerText = 'Adding...';
            btn.disabled = true;

            setTimeout(() => {
                e.target.style.display = 'none';
                success.classList.remove('hidden');
            }, 1000);
        });
    </script>
</body>

</html>
